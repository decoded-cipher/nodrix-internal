<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Widget Lab · iot-push</title>
<link rel="stylesheet" href="./lab.css" />
</head>
<body class="lab">
  <aside class="rail">
    <div class="back"><a href="./index.html">← All widgets</a></div>
    <div>
      <h1>iot-push</h1>
      <div class="sub">One-shot momentary command</div>
    </div>

    <fieldset>
      <legend>Config</legend>
      <label class="field">Title<input id="title" type="text" value="Restart" /></label>
      <label class="field">Payload value<input id="value" type="text" value="restart" /></label>
      <label class="field">Button label<input id="label" type="text" value="Restart now" /></label>
    </fieldset>

    <fieldset>
      <legend>State</legend>
      <div class="sub" style="margin:0">No reported state — each press fires the payload once. Press the button and watch the log.</div>
    </fieldset>
  </aside>

  <main class="stage">
    <div class="cards">
      <section class="scene light"><h2>Light</h2><div class="cell short"><iot-push id="light" data-variable="demoRestart"></iot-push></div></section>
      <section class="scene dark"><h2>Dark</h2><div class="cell short"><iot-push id="dark" data-variable="demoRestart"></iot-push></div></section>
    </div>
    <section class="log"><h2>iot-command events</h2><pre id="log">Press the button…</pre></section>
  </main>

  <script src="./widget-bundle.js"></script>
  <script src="./lab.js"></script>
  <script>
    const els = [$('light'), $('dark')];
    function applyConfig() {
      for (const el of els) {
        el.setAttribute('data-title', $('title').value);
        el.setAttribute('data-value', $('value').value);
        el.setAttribute('data-label', $('label').value);
      }
    }
    ['title', 'value', 'label'].forEach((id) => $(id).addEventListener('input', applyConfig));

    startLog($('log'));
    applyConfig();
  </script>
</body>
</html>
