# Cloudflare Pages config for the nodrix promo site.
# The site itself is static (Astro → dist/); this file exists so the Pages
# Functions in functions/ get their bindings. Deploy with `npm run deploy`.
name = "nodrix"
pages_build_output_dir = "dist"
compatibility_date = "2025-05-01"

# Wishlist signups. DB created with: npx wrangler d1 create nodrix-wishlist
[[d1_databases]]
binding       = "WISHLIST_DB"
database_name = "nodrix-wishlist"
database_id   = "a0ebf9dd-43eb-4cf7-a3cf-788d34b42ebd"
