<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Widget Lab · iot-gauge</title>
<link rel="stylesheet" href="./lab.css" />
</head>
<body class="lab">
  <aside class="rail">
    <div class="back"><a href="./index.html">← All widgets</a></div>
    <div>
      <h1>iot-gauge</h1>
      <div class="sub">Radial gauge over a range</div>
    </div>

    <fieldset>
      <legend>Config</legend>
      <label class="field">Title<input id="title" type="text" value="CPU" /></label>
      <div class="grid2">
        <label class="field">Min<input id="min" type="number" value="0" /></label>
        <label class="field">Max<input id="max" type="number" value="100" /></label>
      </div>
    </fieldset>

    <fieldset>
      <legend>Push reported value (→ el.value)</legend>
      <input id="pushval" type="text" value="47" />
      <div class="quick">
        <button class="btn" id="push">Push value</button>
        <button class="btn q" data-v="0">0</button>
        <button class="btn q" data-v="47">47</button>
        <button class="btn q" data-v="83">83</button>
        <button class="btn q" data-v="100">100</button>
      </div>
    </fieldset>
  </aside>

  <main class="stage">
    <div class="cards">
      <section class="scene light"><h2>Light</h2><div class="cell sq"><iot-gauge id="light" data-variable="demoCpu"></iot-gauge></div></section>
      <section class="scene dark"><h2>Dark</h2><div class="cell sq"><iot-gauge id="dark" data-variable="demoCpu"></iot-gauge></div></section>
    </div>
    <section class="log"><h2>iot-command events</h2><pre id="log">iot-gauge is read-only — it emits nothing. Push values to see it move.</pre></section>
  </main>

  <script src="./widget-bundle.js"></script>
  <script src="./lab.js"></script>
  <script>
    const els = [$('light'), $('dark')];
    function applyConfig() {
      for (const el of els) {
        el.setAttribute('data-title', $('title').value);
        el.setAttribute('data-min', $('min').value);
        el.setAttribute('data-max', $('max').value);
      }
    }
    ['title', 'min', 'max'].forEach((id) => $(id).addEventListener('input', applyConfig));

    function push(raw) { const v = parsePush(raw); if (v !== undefined) for (const el of els) el.value = v; }
    $('push').addEventListener('click', () => push($('pushval').value));
    document.querySelectorAll('.q').forEach((b) => b.addEventListener('click', () => { $('pushval').value = b.dataset.v; push(b.dataset.v); }));

    startLog($('log'));
    applyConfig();
    push('47');
  </script>
</body>
</html>
