<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nodrix — Frame 2 (Dashboard)</title>
<link rel="stylesheet" href="_shared.css">
<style>
  body { background: var(--n-50); }

  /* Browser shell — sized so the embedded screenshot fills it without
     letterboxing. Width chosen so width / aspect + titlebar fits the frame. */
  .browser {
    position: absolute; top: 24px; left: 120px; right: 120px;
    background: #fff; border-radius: 14px; overflow: hidden;
    border: 1px solid var(--n-200);
    box-shadow: 0 30px 60px -25px rgba(15,23,42,0.18), 0 8px 24px -12px rgba(15,23,42,0.10);
  }
  .titlebar {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 14px; border-bottom: 1px solid var(--n-200);
    background: linear-gradient(#fff, #fafafa);
  }
  .traffic { display: flex; gap: 6px; }
  .traffic span { width: 11px; height: 11px; border-radius: 50%; display: block; }
  .traffic .r { background: #ff5f57; }
  .traffic .y { background: #febc2e; }
  .traffic .g { background: #28c840; }
  .url {
    margin: 0 auto; padding: 5px 14px; border-radius: 6px;
    background: var(--n-100); color: var(--n-500);
    font-size: 11.5px; font-family: "JetBrains Mono", monospace;
    min-width: 400px; text-align: center;
  }
  .url .lock { color: var(--n-400); margin-right: 6px; }
  .live {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 10.5px; font-weight: 600; color: var(--c-700);
    background: var(--c-50); border: 1px solid var(--c-100);
    padding: 3px 8px; border-radius: 9999px;
  }
  .live .pulse {
    width: 6px; height: 6px; border-radius: 50%; background: var(--c-500);
    box-shadow: 0 0 0 4px rgba(255,106,69,0.20);
  }

  .shot {
    display: block;
    width: 100%;
    height: auto;
  }

  .caption-strip {
    position: absolute; bottom: 24px; left: 120px; right: 120px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 22px; border-radius: 12px;
    background: var(--n-900); color: #fff;
  }
  .caption-strip .t { font-size: 15px; font-weight: 700; letter-spacing: -0.01em; }
  .caption-strip .s { font-size: 12.5px; color: var(--n-400); margin-top: 2px; }
</style>
</head>
<body>
<div class="frame">
  <div class="browser">
    <div class="titlebar">
      <div class="traffic"><span class="r"></span><span class="y"></span><span class="g"></span></div>
      <div class="url"><span class="lock">🔒</span>your-nodrix.workers.dev/dashboards/tunnel-a</div>
      <span class="live"><span class="pulse"></span>Live · WebSocket</span>
    </div>
    <img class="shot" src="image.png" alt="Tunnel A dashboard">
  </div>

  <div class="caption-strip">
    <div>
      <div class="t">Drag-and-drop dashboards. Two-way. Realtime.</div>
      <div class="s">Hibernating WebSockets — free while idle.</div>
    </div>
    <div style="font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--n-400);">/v1/state · /v1/series</div>
  </div>
</div>
</body>
</html>
