<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nodrix — PH Thumbnail</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; width: 1080px; height: 1080px; overflow: hidden; background: #fff; }
  .square {
    width: 1080px; height: 1080px;
    position: relative; overflow: hidden;
    background: #ffffff;
  }
  /* coral aurora — matches promo hero exactly */
  .aurora { position: absolute; inset: 0; pointer-events: none; }
  .aurora span {
    position: absolute; display: block; border-radius: 9999px; filter: blur(110px);
  }
  .aurora .a1 {
    width: 760px; height: 760px; top: -220px; left: -200px;
    background: radial-gradient(closest-side, rgba(255,106,69,0.38), transparent 70%);
  }
  .aurora .a2 {
    width: 680px; height: 680px; bottom: -200px; right: -180px;
    background: radial-gradient(closest-side, rgba(255,165,137,0.34), transparent 70%);
  }
  .aurora .a3 {
    width: 520px; height: 520px; top: 30%; left: 50%; transform: translateX(-50%);
    background: radial-gradient(closest-side, rgba(255,125,91,0.20), transparent 70%);
  }
  /* dotted backdrop — echoes the dashboard builder grid */
  .grid {
    position: absolute; inset: 0;
    background-image: radial-gradient(rgba(15, 23, 42, 0.07) 2px, transparent 2px);
    background-size: 44px 44px;
    opacity: 0.7;
  }

  .center {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; gap: 36px;
  }
  .icon-wrap {
    width: 520px; height: 520px;
    display: flex; align-items: center; justify-content: center;
    filter: drop-shadow(0 24px 60px rgba(15, 23, 42, 0.10)) drop-shadow(0 4px 12px rgba(255,106,69,0.18));
  }
  .icon-wrap img {
    width: 100%; height: 100%; object-fit: contain;
    display: block;
  }
  .wordmark-wrap {
    width: 620px;
    display: flex; align-items: center; justify-content: center;
  }
  .wordmark-wrap img {
    width: 100%; height: auto; display: block;
  }
</style>
</head>
<body>
<div class="square">
  <div class="aurora"><span class="a1"></span><span class="a2"></span><span class="a3"></span></div>
  <div class="grid"></div>
  <div class="center">
    <div class="icon-wrap">
      <img src="../../promo/public/icon-512.png" alt="nodrix icon">
    </div>
    <div class="wordmark-wrap">
      <img src="../../promo/public/dark_logo.png" alt="nodrix">
    </div>
  </div>
</div>
</body>
</html>
